<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GShoe Collection | Premium Footwear</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #FFD700;
    --dark: #E6C200;
    --bg: #FFFDF0;
    --text: #222;
  }
    * { box-sizing: border-box; margin:0; padding:0; }
  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
  }
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0,0,0,0.05);
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .brand { font-weight:700; font-size:1.4rem; letter-spacing:1px; }
  .hero {
    height: 60vh;
    min-height: 380px;
    display: grid;
    place-items: center;
    text-align:center;
    background: radial-gradient(1200px 400px at 50% -10%, #fff6c4, var(--bg));
    transition: background 0.4s ease;
  }
  .hero img {
    width: min(420px, 80vw);
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.2));
    animation: float 4s ease-in-out infinite;
    transform-style: preserve-3d;
  }
  .hero h1 { font-size: 2.4rem; margin-top: 12px; }
  @keyframes float {
    0%,100% { transform: translateY(0) rotate(-4deg); }
    50% { transform: translateY(-14px) rotate(4deg); }
  }
  .container { max-width:1200px; margin:40px auto; padding:0 20px; }
  .grid {
    display:grid;
    grid-template-columns: 2fr 1fr;
    grid-auto-rows: 280px;
    gap: 20px;
  }
  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; grid-auto-rows: 260px; }
  }
  .card {
    position: relative;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 20px;
    overflow:hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    transition: transform 0.3s ease, background 0.3s ease;
    cursor:pointer;
  }
  .card:hover { transform: translateY(-4px); background: #fff8d2; }
  .card img {
    width:100%; height:100%; object-fit:cover;
    transition: transform 0.35s ease;
  }
  .card:hover img { transform: scale(1.05); }
  .card .info {
    position:absolute; bottom:0; left:0; right:0;
    padding:14px 16px;
    background: linear-gradient(180deg, transparent, rgba(0,0,0,0.55));
    color:#fff;
    display:flex; justify-content:space-between; align-items:end;
  }
  .quick {
    position:absolute; inset:0;
    display:grid; place-items:center;
    opacity:0; transition:opacity 0.3s ease;
    background: rgba(0,0,0,0.25);
  }
  .card:hover .quick { opacity:1; }
  .quick button {
    padding:10px 16px; border:none; border-radius:12px;
    background:var(--primary); color:#111; font-weight:600;
    cursor:pointer;
  }
  .modal {
    display:none;
    position:fixed; inset:0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    overflow-y:auto;
    padding: 40px 16px;
  }
  .modal-box {
    background:#fff;
    max-width:900px; margin:auto;
    border-radius:20px; overflow:hidden;
    animation: pop .25s ease;
  }
  @keyframes pop { from { transform: scale(.96); opacity:0; } }
  .modal-top img {
    width:100%; max-height:420px; object-fit:contain; background:#fafafa;
  }
  .modal-body { padding:20px; }
  .modal-body h2 { margin-bottom:8px; }
  .sizes { display:flex; flex-wrap:wrap; gap:10px; margin:12px 0 20px; }
  .size {
    padding:8px 14px; border:2px solid #ddd; border-radius:999px;
    cursor:pointer; font-weight:600;
    transition: all .2s;
  }
  .size.active { border-color: var(--primary); background:var(--primary); color:#111; }
  .stock {
    display:inline-block; padding:6px 10px; border-radius:999px;
    background:#fff3cd; color:#856404; font-weight:600; font-size:.85rem;
  }
  .mini {
    margin-top:20px;
    display:grid; grid-template-columns: repeat(3,1fr); gap:12px;
  }
  .mini .mcard {
    background:#f9f9f9; border-radius:12px; padding:8px; text-align:center;
    border:1px solid #eee;
  }
  .mini img { width:100%; height:80px; object-fit:cover; border-radius:8px; }
  .modal-actions { display:flex; gap:10px; margin-top:16px; }
  .want-btn {
    padding:12px 18px; border:none; border-radius:12px;
    background:var(--primary); color:#111; font-weight:700; cursor:pointer;
    text-decoration:none;
    display:inline-block;
  }
  .want-btn.bounce { animation: bounce .4s; }
  @keyframes bounce {
    0%{transform:scale(1);} 50%{transform:scale(1.08);} 100%{transform:scale(1);}
  }
  .close {
    position:absolute; right:16px; top:12px; font-size:28px; cursor:pointer; color:#fff;
  }
  .wa {
    position:fixed; right:24px; bottom:24px;
    background:#25D366; color:#fff;
    width:58px; height:58px; border-radius:50%;
    display:grid; place-items:center;
    font-size:28px; text-decoration:none;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    animation: pulse 1.8s infinite;
    z-index: 900;
  }
  .wa::after {
    content:"Ask about your size!";
    position:absolute; right:70px; white-space:nowrap;
    background:#111; color:#fff; padding:8px 10px; border-radius:10px;
    font-size:.8rem; opacity:0; transform: translateX(10px);
    transition: all .25s;
  }
  .wa:hover::after { opacity:1; transform: translateX(0); }
  @keyframes pulse {
    0%{ box-shadow:0 0 0 0 rgba(37,211,102,.7); }
    70%{ box-shadow:0 0 0 18px rgba(37,211,102,0); }
    100%{ box-shadow:0 0 0 0 rgba(37,211,102,0); }
  }
</style>
</head>
<body>

<nav>
  <div class="brand">GShoe Collection</div>
</nav>

<section class="hero">
  <div>
    <img src="https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb?q=80&w=800" alt="Samba White">
    <h1>Step into Style</h1>
  </div>
</section>

<div class="container">
  <div class="grid" id="grid"></div>
</div>

<div class="modal" id="modal">
  <span class="close" onclick="closeModal()">&times;</span>
  <div class="modal-box">
    <div class="modal-top">
      <img id="mImg" src="">
    </div>
    <div class="modal-body">
      <h2 id="mName">Shoe Name</h2>
      <span class="stock" id="mStock">Only 2 left!</span>
      <div class="sizes" id="mSizes"></div>
      <div class="modal-actions">
        <a class="want-btn" id="wantBtn" target="_blank">I want this</a>
      </div>
      <div class="mini" id="mMini"></div>
    </div>
  </div>
</div>

<a class="wa" href="https://wa.me/254719309727?text=Hello%20GShoe%20Collection,%20I%20am%20interested%20in%20your%20shoes." target="_blank">💬</a>

<script>
  const shoes = [
    { id:1, name:"Airforce1 White (Adult)", price:"KSh 3,500", img:"‎https://freeimage.host/i/B33a9ZN", sizes:[38,40,42,44], stock:2 },
    { id:2, name:"Air Force 1 Black & White (Adult)", price:"KSh 4,200", img:"https://images.unsplash.com/photo-1549298916-b41d501d3772?q=80&w=800", sizes:[39,41,42,44], stock:5 },
    { id:3, name:"Jordan 1 (Adult)", price:"KSh 5,500", img:"https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb?q=80&w=800", sizes:[40,42,43,44,45], stock:3 },
    { id:4, name:"Jordan 4 (Adult)", price:"KSh 5,800", img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=800", sizes:[40,41,42,43,44], stock:4 },
    { id:5, name:"Jordan 4 (Kids)", price:"KSh 3,800", img:"https://images.unsplash.com/photo-1595950653106-6c9eb6808177?q=80&w=800", sizes:[32,33,34,35,36], stock:6 },
    { id:6, name:"Air Force 1 (Kids)", price:"KSh 3,200", img:"https://images.unsplash.com/photo-1600269452121-4f2416e55c28?q=80&w=800", sizes:[32,33,34,35,36], stock:7 }
  ];

  const grid = document.getElementById('grid');
  const modal = document.getElementById('modal');
  const mImg = document.getElementById('mImg');
  const mName = document.getElementById('mName');
  const mSizes = document.getElementById('mSizes');
  const mStock = document.getElementById('mStock');
  const mMini = document.getElementById('mMini');
  const wantBtn = document.getElementById('wantBtn');
  let selectedSize = null;

  function renderGrid() {
    grid.innerHTML = '';
    shoes.forEach((s,i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.gridRow = i === 0 ? 'span 2' : 'span 1';
      card.innerHTML = `
        <img src="${s.img}" alt="${s.name}">
        <div class="quick"><button>Quick View</button></div>
        <div class="info"><h3>${s.name}</h3><span>${s.price}</span></div>
      `;
      card.onclick = () => openModal(s);
      grid.appendChild(card);
    });
  }

  function openModal(shoe) {
    selectedSize = null;
    mImg.src = shoe.img;
    mName.textContent = shoe.name;
    mStock.textContent = shoe.stock <= 2 ? `Only ${shoe.stock} left!` : `In stock`;
    mSizes.innerHTML = '';
    shoe.sizes.forEach(sz => {
      const el = document.createElement('div');
      el.className = 'size';
      el.textContent = sz;
      el.onclick = () => {
        [...mSizes.children].forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        selectedSize = sz;
        wantBtn.href = `https://wa.me/254719309727?text=Hello%20GShoe%20Collection,%20I%20want%20this%20${encodeURIComponent(shoe.name)}%20size%20${sz}`;
      };
      mSizes.appendChild(el);
    });
    mMini.innerHTML = '';
    shoes.filter(x=>x.id!==shoe.id).forEach(x => {
      const div = document.createElement('div');
      div.className = 'mcard';
      div.innerHTML = `<img src="${x.img}" alt="${x.name}"><div>${x.name}<br><small>Sizes: ${x.sizes.join(', ')}</small></div>`;
      mMini.appendChild(div);
    });
    wantBtn.href = `https://wa.me/254719309727?text=Hello%20GShoe%20Collection,%20I%20want%20this%20${encodeURIComponent(shoe.name)}`;
    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modal.style.display = 'none';
    document.body.style.overflow = 'auto';
  }

  wantBtn.onclick = () => {
    wantBtn.classList.add('bounce');
    setTimeout(()=>wantBtn.classList.remove('bounce'),400);
  };

  window.onclick = e => { if(e.target === modal) closeModal(); };

  renderGrid();
</script>

</body>
    </html>
